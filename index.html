<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>useEffect Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 3rem auto; padding: 0 1rem; }
    h1   { font-size: 1.4rem; margin-bottom: 1.5rem; }
    .card {
      background: #f4f4f5;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .label { font-size: 0.8rem; color: #71717a; margin-bottom: 0.25rem; }
    .value { font-size: 1.5rem; font-weight: 600; }
    .buttons { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    button {
      flex: 1;
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 6px;
      background: #18181b;
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:hover { background: #3f3f46; }
    #log {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #52525b;
      max-height: 180px;
      overflow-y: auto;
    }
    #log p { margin: 0.2rem 0; }
  </style>
</head>
<body>
  <h1>useEffect Demo</h1>

  <div class="card">
    <div class="label">count</div>
    <div class="value" id="count-display">0</div>
  </div>

  <div class="card">
    <div class="label">isActive</div>
    <div class="value" id="bool-display">false</div>
  </div>

  <div class="buttons">
    <button id="btn-increment">Increment Count</button>
    <button id="btn-toggle">Toggle Boolean</button>
  </div>

  <div id="log"></div>

  <script src="functions.js"></script>
  <script>
    // Initialise state — no effects registered yet so no callbacks fire.
    state.count    = 0;
    state.isActive = false;

    // Watches only count.
    useEffect(() => {
      document.getElementById('count-display').textContent = state.count;
    }, ['count']);

    // Watches only isActive.
    useEffect(() => {
      document.getElementById('bool-display').textContent = String(state.isActive);
    }, ['isActive']);

    // Watches both — re-runs when either changes.
    useEffect(() => {
      const log   = document.getElementById('log');
      const entry = document.createElement('p');
      entry.textContent =
        `[${new Date().toLocaleTimeString()}] count=${state.count}, isActive=${state.isActive}`;
      log.prepend(entry);
    }, ['count', 'isActive']);

    document.getElementById('btn-increment').addEventListener('click', () => {
      state.count++;
    });

    document.getElementById('btn-toggle').addEventListener('click', () => {
      state.isActive = !state.isActive;
    });
  </script>
</body>
</html>
